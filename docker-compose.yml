services:
  postgres:
    image: postgres:16-alpine
    container_name: aairp-postgres
    environment:
      POSTGRES_USER: aairp
      POSTGRES_PASSWORD: aairp
      POSTGRES_DB: aairp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aairp -d aairp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aairp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
